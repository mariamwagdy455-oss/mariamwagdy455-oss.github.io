<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="contact-style.css">
<link href="https://fonts.googleapis.com/css2?family=poppins:wght@300;400;600&disply=swap" rel="stylesheet">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">Bik Book</div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="Profile.html">Profile</a>
                <a href="category.html">Category</a>
                <a href="favourites.html">Favorites</a>
                <a href="contact.html">Contact</a>
            </div>
             <button class="theme-btn" onclick="toggleTheme()">
            <svg id="themeIcon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3
                     7 7 0 0 0 21 12.79z" /> 
                    </svg>
                </button>
        </nav>
    </header>

    <div class="container">
        <div class="contact-info">
            <p><strong>Contact us on Email:</strong> library_support@gmail.com</p>
            <p><strong>Phone Number:</strong> +20 100 000 0000</p>
        </div>

        <div class="contact-box">
            <h2>Send us a Message ✉️</h2>
            <form id="contactForm">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="name" placeholder="Enter your name" required>
                </div>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="username@gmail.com" required>
                </div>
                <div class="input-group">
                    <label>Subject</label>
                    <input type="text" id="subject" placeholder="Inquiry / Suggestion / Complaint" required>
                </div>
                <div class="input-group">
                    <label>Message</label>
                    <textarea id="message" rows="5" placeholder="Write your message here..." required></textarea>
                </div>
                <button type="submit" class="send-btn">Send Message</button>
            </form>
        </div>
    </div>

    <footer>
        © 2026 Library Project
    </footer>

    <script src="contact-script.js"></script>
</body>
</html>
